server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # SPA fallback + sensible security headers for the entry document.
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Vite hashes asset filenames, so they can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other public static files (robots.txt, sitemap.xml, ads.txt, favicons, …).
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|xml|txt)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # index.html must never be cached, otherwise users get stale asset refs.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    location = /ads.txt {
        expires 1d;
    }
}
