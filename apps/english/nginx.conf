server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # The dc-runtime pulls React/Babel from CDN and renders client-side, so the
    # entry document must never be cached (stale runtime refs would break it).
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }
}
